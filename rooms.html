<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms Management | Luxe Admin</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand">LUXE. ADMIN</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="frontdesk.html">🛎️ Front Desk</a></li>
            <li><a href="rooms.html" class="active">🛏️ Rooms</a></li>
            <li><a href="guests.html">👥 Guests</a></li>
        </ul>
        <div style="margin-top: auto;">
            <ul class="nav-links">
                <li><a href="index.html">⬅️ Back to Website</a></li>
                <li><a href="index.html" style="color: #ef4444;" onclick="alert('Logged out successfully.')">🚪 Logout</a></li>
            </ul>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-title">
                <h1>Room Inventory</h1>
                <p>Manage and view status of all hotel rooms.</p>
            </div>
        </header>

        <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
            <div class="stat-card">
                <div class="stat-icon icon-green">✨</div>
                <div class="stat-title">Available Clean</div>
                <div class="stat-value" id="roomsAvailable">3</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon icon-orange">🛏️</div>
                <div class="stat-title">Occupied</div>
                <div class="stat-value" id="roomsOccupied">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon icon-purple">🧹</div>
                <div class="stat-title">Needs Cleaning</div>
                <div class="stat-value">0</div>
            </div>
        </div>

        <div class="recent-bookings">
            <h2>Room Status List</h2>
            <table>
                <thead>
                    <tr><th>Room No.</th><th>Type</th><th>Price/Night</th><th>Current Status</th></tr>
                </thead>
                <tbody id="roomsTableBody">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
